<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ailiv — Consulenza e Ottimizzazione AI</title>
<meta name="description" content="Ailiv. Consulenza e ottimizzazione AI. Stiamo costruendo qualcosa di fico.">
<link rel="icon" type="image/png" href="assets/bollino-ailiv.png">
<link rel="apple-touch-icon" href="assets/bollino-ailiv.png">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --navy: #143d5c; --navy-dark: #0e2c43; --cream: #fafaf7; }
  html { font-family: 'Inter', sans-serif; }
  body { background: var(--cream); color: var(--navy); overflow: hidden; min-height: 100vh; }

  .blob { position: absolute; border-radius: 50%; filter: blur(140px); opacity: 0.18; pointer-events: none; z-index: 0; }
  @keyframes float1 { 0%,100% { transform: translate(0,0) scale(1) } 50% { transform: translate(30px,-40px) scale(1.1) } }
  @keyframes float2 { 0%,100% { transform: translate(0,0) scale(1) } 50% { transform: translate(-40px,30px) scale(0.95) } }
  .b1 { animation: float1 10s ease-in-out infinite; }
  .b2 { animation: float2 12s ease-in-out infinite; }

  @keyframes pulse-dot { 0%,100% { opacity: 1; transform: scale(1) } 50% { opacity: .4; transform: scale(1.4) } }
  .dot { animation: pulse-dot 1.6s ease-in-out infinite; }

  .bar-track { background: rgba(20,61,92,0.08); }
  .bar-fill { background: linear-gradient(90deg, transparent 0%, var(--navy) 40%, var(--navy) 60%, transparent 100%); background-size: 200% 100%; animation: load 2.8s ease-in-out infinite; }
  @keyframes load { 0% { background-position: 100% 0 } 100% { background-position: -100% 0 } }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px) } to { opacity: 1; transform: translateY(0) } }
  .fade { animation: fadeUp .9s ease-out both; }
  .d1 { animation-delay: .1s } .d2 { animation-delay: .3s } .d3 { animation-delay: .5s } .d4 { animation-delay: .7s } .d5 { animation-delay: .9s }

  .btn-navy { background: var(--navy); color: #fff; transition: all .3s; box-shadow: 0 10px 40px rgba(20,61,92,0.25); }
  .btn-navy:hover { background: var(--navy-dark); transform: translateY(-2px); box-shadow: 0 15px 50px rgba(20,61,92,0.35); }

  .logo-img { max-width: 520px; width: 80%; height: auto; }
  @media (max-width: 640px) { .logo-img { width: 85%; } }
</style>
</head>
<body class="flex items-center justify-center px-6 relative">

  <div class="blob b1 w-[500px] h-[500px] top-0 -left-40" style="background: #143d5c;"></div>
  <div class="blob b2 w-[500px] h-[500px] bottom-0 -right-40" style="background: #2a6fa3;"></div>

  <main class="relative z-10 text-center max-w-2xl py-12">

    <img src="assets/logo-ailiv.png" alt="Ailiv" class="logo-img mx-auto mb-10 fade d1" />

    <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full border border-[#143d5c]/15 bg-white/60 backdrop-blur text-xs font-medium text-[#143d5c] mb-8 fade d2">
      <span class="w-2 h-2 rounded-full bg-green-500 dot"></span>
      Lavori in corso
    </div>

    <h1 class="text-4xl md:text-6xl font-bold tracking-tight leading-[1.05] mb-6 fade d3">
      Stiamo costruendo<br>qualcosa di fico.
    </h1>

    <p class="text-[#143d5c]/70 text-lg md:text-xl mb-12 max-w-xl mx-auto fade d4">
      Il nuovo sito di <strong>Ailiv</strong> arriva molto presto.<br>
      Nel frattempo, se vuoi parlarci di un progetto:
    </p>

    <div class="w-full max-w-xs mx-auto h-[3px] rounded-full bar-track overflow-hidden mb-12 fade d4">
      <div class="bar-fill h-full w-full"></div>
    </div>

    <div class="fade d5">
      <a href="mailto:ciao@ailiv.it" class="btn-navy inline-block px-8 py-4 rounded-full font-semibold text-base">
        ciao@ailiv.it →
      </a>
    </div>

    <p class="text-[#143d5c]/40 text-xs mt-16 tracking-wide fade d5">
      © 2026 AILIV — Consulenza e Ottimizzazione AI
    </p>

  </main>

</body>
</html>
