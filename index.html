<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ailiv — Sito in costruzione</title>
<meta name="description" content="Ailiv. Stiamo costruendo qualcosa di fico.">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html { font-family: 'Space Grotesk', sans-serif; }
  body { background: #0a0a0a; color: #fafafa; overflow: hidden; }
  .gradient-text { background: linear-gradient(135deg, #fff 0%, #888 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .blob { position: absolute; border-radius: 50%; filter: blur(140px); opacity: 0.4; pointer-events: none; z-index: 0; }
  @keyframes float { 0%,100% { transform: translate(0,0) } 50% { transform: translate(20px,-30px) } }
  @keyframes float2 { 0%,100% { transform: translate(0,0) } 50% { transform: translate(-25px,25px) } }
  .b1 { animation: float 8s ease-in-out infinite; }
  .b2 { animation: float2 10s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100% { opacity: 1; transform: scale(1) } 50% { opacity: .5; transform: scale(1.3) } }
  .dot { animation: pulse-dot 1.5s ease-in-out infinite; }
  .bar { background: linear-gradient(90deg, #fff 0%, #fff 60%, rgba(255,255,255,0.1) 60%, rgba(255,255,255,0.1) 100%); background-size: 200% 100%; animation: load 2.5s ease-in-out infinite; }
  @keyframes load { 0% { background-position: 100% 0 } 100% { background-position: -100% 0 } }
</style>
</head>
<body class="min-h-screen flex items-center justify-center px-6 relative">

  <div class="blob b1 bg-purple-600 w-[500px] h-[500px] top-0 -left-40"></div>
  <div class="blob b2 bg-blue-600 w-[500px] h-[500px] bottom-0 -right-40"></div>

  <div class="relative z-10 text-center max-w-2xl">

    <div class="text-3xl font-bold tracking-tight mb-16">ailiv<span class="text-white/40">.</span></div>

    <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full border border-white/10 bg-white/5 text-xs text-white/70 mb-8">
      <span class="w-2 h-2 rounded-full bg-green-400 dot"></span>
      Lavori in corso
    </div>

    <h1 class="text-5xl md:text-7xl font-bold tracking-tighter leading-none mb-6 gradient-text">
      Stiamo costruendo<br>qualcosa di fico.
    </h1>

    <p class="text-white/60 text-lg mb-12">
      Il nuovo sito di Ailiv arriva molto presto.<br>Nel frattempo, se vuoi parlarci di un progetto:
    </p>

    <div class="w-full max-w-sm mx-auto h-1 rounded-full bg-white/10 overflow-hidden mb-12">
      <div class="bar h-full w-full"></div>
    </div>

    <a href="mailto:ciao@ailiv.it" class="inline-block bg-white text-black px-8 py-4 rounded-full font-medium hover:scale-105 transition" style="box-shadow: 0 0 80px rgba(255,255,255,0.15)">
      ciao@ailiv.it
    </a>

    <p class="text-white/30 text-xs mt-16">© 2026 Ailiv</p>
  </div>

</body>
</html>
